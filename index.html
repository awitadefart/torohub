<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ToroHub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c0392b; --red-light: #e74c3c;
    --bg: #0f0f0f; --surface: #181818; --surface2: #222;
    --border: rgba(255,255,255,0.08); --text: #f1f1f1; --muted: #aaa;
    --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; padding: 10px 20px; }
  .logo { display: flex; align-items: center; gap: 0; text-decoration: none; flex-shrink: 0; }
  .logo img { height: 48px; width: auto; object-fit: contain; }

  .search-wrap { flex: 1; max-width: 560px; display: flex; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; background: var(--surface); }
  .search-wrap input { flex: 1; background: transparent; border: none; outline: none; padding: 9px 18px; font-size: 14px; color: var(--text); font-family: 'Inter', sans-serif; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap button { background: var(--surface2); border: none; border-left: 1px solid var(--border); padding: 9px 18px; cursor: pointer; color: var(--muted); font-size: 16px; }

  .cats { display: flex; gap: 8px; padding: 10px 20px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; background: var(--bg); }
  .cats::-webkit-scrollbar { display: none; }
  .cat { white-space: nowrap; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
  .cat:hover { background: var(--surface2); }
  .cat.active { background: var(--text); color: #000; border-color: transparent; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; padding: 20px; }

  .card { cursor: pointer; border-radius: var(--radius); overflow: hidden; transition: transform 0.18s ease; }
  .card:hover { transform: translateY(-3px); }

  .thumb { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px solid var(--border); }
  .play-btn { position: absolute; width: 46px; height: 46px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.18s; }
  .play-btn::after { content: ''; border-left: 16px solid #fff; border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 4px; }
  .card:hover .play-btn { opacity: 1; }
  .dur { position: absolute; bottom: 7px; right: 9px; background: rgba(0,0,0,0.85); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

  .info { display: flex; gap: 11px; padding: 10px 4px 4px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; }
  .meta { flex: 1; min-width: 0; }
  .vtitle { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
  .ch { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .stats { font-size: 12px; color: var(--muted); }
  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
  .overlay.on { display: flex; }

  .player-box { background: var(--surface); border-radius: 14px; width: 100%; max-width: 900px; overflow: hidden; border: 1px solid var(--border); animation: popIn 0.22s ease; }
  @keyframes popIn { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .player-screen { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
  .player-screen iframe { width: 100%; height: 100%; border: none; display: block; }

  .player-bar { padding: 14px 20px; border-top: 1px solid var(--border); }
  .player-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
  .player-ch { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .player-actions { display: flex; justify-content: flex-end; }
  .btn-close { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
  .btn-close:hover { background: var(--surface2); }
</style>
</head>

let currentCat = 'all';

function driveEmbed(id) {
  return 'https://drive.google.com/file/d/' + id + '/preview';
}

function render(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="empty">No se encontraron videos 🐂</div>';
    return;
  }
  list.forEach(v => {
    const c = document.createElement('div');
    c.className = 'card';
    c.innerHTML =
      '<div class="thumb" style="background:' + v.bg + '">' +
        '<span style="font-size:52px">' + v.em + '</span>' +
        '<div class="play-btn"></div>' +
        '<div class="dur">' + v.dur + '</div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="avatar" style="background:' + v.av + '">' + v.ch.slice(0,2) + '</div>' +
        '<div class="meta">' +
          '<div class="vtitle">' + v.title + '</div>' +
          '<div class="ch">' + v.ch + '</div>' +
          '<div class="stats">' + v.views + ' vistas · ' + v.ago + '</div>' +
        '</div>' +
      '</div>';
    c.onclick = function() { openPlayer(v); };
    grid.appendChild(c);
  });
}

function apply() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = currentCat === 'all' ? videos : videos.filter(function(v){ return v.cat === currentCat; });
  if (q) list = list.filter(function(v){ return v.title.toLowerCase().includes(q) || v.ch.toLowerCase().includes(q); });
  render(list);
}

function filterCat(btn, cat) {
  document.querySelectorAll('.cat').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  currentCat = cat;
  apply();
}

document.getElementById('searchInput').addEventListener('input', apply);

function openPlayer(v) {
  document.getElementById('pScreen').innerHTML = '<iframe src="' + driveEmbed(v.driveId) + '" allowfullscreen allow="autoplay"></iframe>';
  document.getElementById('pTitle').textContent = v.title;
  document.getElementById('pCh').textContent = v.ch + ' · ' + v.views + ' vistas · ' + v.ago;
  document.getElementById('overlay').classList.add('on');
}

function closePlayer() {
  document.getElementById('pScreen').innerHTML = '';
  document.getElementById('overlay').classList.remove('on');
}

function maybeClose(e) {
  if (e.target === document.getElementById('overlay')) closePlayer();
}

render(videos);
</script>
